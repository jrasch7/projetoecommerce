<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir senha · Painel administrativo</title>
    <script src="https://cdn.tailwindcss.com?3.4.1"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background:
              radial-gradient(circle at 0% 0%, rgba(231,76,60,0.12), transparent 40%),
              radial-gradient(circle at 100% 100%, rgba(10,37,64,0.6), transparent 50%),
              linear-gradient(135deg, #050a14 0%, #0b1220 50%, #11203a 100%);
            min-height: 100vh;
        }
        .shell {
            backdrop-filter: blur(14px);
            background: rgba(255,255,255,0.97);
            box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
        }
        .input-field { transition: all 0.2s ease; }
        .input-field:focus {
            border-color: #0a2540;
            box-shadow: 0 0 0 3px rgba(10,37,64,0.08);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0a2540, #11203a);
            transition: all 0.2s ease;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -8px rgba(10,37,64,0.5); }
        .btn-primary:disabled { opacity: 0.5; transform: none; }
        .brand-mark { background: linear-gradient(135deg, #0a2540, #1a365d); box-shadow: 0 8px 24px -8px rgba(10,37,64,0.6); }
        .sulcore-tag { font-family: 'Inter', monospace; letter-spacing: 0.18em; font-weight: 700; font-size: 0.65rem; }
        .strength-bar { transition: width 0.3s ease, background-color 0.3s ease; }
    </style>
</head>
<body class="flex items-center justify-center p-4 antialiased">

    <div class="w-full max-w-md">
        <div class="text-center mb-6">
            <div class="brand-mark inline-flex w-14 h-14 rounded-2xl items-center justify-center mb-4">
                <i class="ph-bold ph-key text-white text-3xl"></i>
            </div>
            <h1 class="text-white text-2xl font-bold tracking-tight">Definir senha</h1>
            <p class="text-slate-400 text-sm mt-1" id="subtitle">Bem-vindo! Crie sua senha para acessar o painel.</p>
        </div>

        <div class="shell rounded-3xl p-8">
            <!-- Loading -->
            <div id="loadingState" class="text-center py-10">
                <i class="ph ph-spinner animate-spin text-4xl text-slate-300"></i>
                <p class="text-sm text-slate-500 mt-3">Validando convite…</p>
            </div>

            <!-- Erro -->
            <div id="errorState" class="hidden">
                <div class="bg-rose-50 border border-rose-200 text-rose-800 rounded-xl p-4 text-sm flex gap-3">
                    <i class="ph ph-warning-circle text-2xl flex-shrink-0"></i>
                    <p id="errorMessage" class="leading-relaxed"></p>
                </div>
                <a href="/admin-login.html" class="btn-primary mt-4 w-full py-3 rounded-xl text-white font-semibold flex items-center justify-center gap-2">
                    <i class="ph-bold ph-arrow-right"></i>
                    <span>Ir para o login</span>
                </a>
            </div>

            <!-- Formulário -->
            <form id="passwordForm" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500 mb-1.5">Email</label>
                    <input id="emailField" type="email" disabled
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500 mb-1.5">Nova senha</label>
                    <div class="relative">
                        <i class="ph ph-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input id="passwordField" type="password" required minlength="8" placeholder="Mínimo 8 caracteres"
                               class="input-field w-full pl-11 pr-12 py-3 rounded-xl border border-slate-200 outline-none">
                        <button type="button" id="togglePass" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    <!-- Strength meter -->
                    <div class="mt-2 h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div id="strengthBar" class="strength-bar h-full w-0 bg-rose-400"></div>
                    </div>
                    <p id="strengthLabel" class="text-xs text-slate-400 mt-1">Use 8+ caracteres com letras e números.</p>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500 mb-1.5">Confirmar senha</label>
                    <div class="relative">
                        <i class="ph ph-lock-key absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input id="confirmField" type="password" required minlength="8"
                               class="input-field w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 outline-none">
                    </div>
                </div>
                <button type="submit" id="submitBtn"
                        class="btn-primary w-full py-3 rounded-xl text-white font-semibold flex items-center justify-center gap-2">
                    <i class="ph-bold ph-check"></i>
                    <span>Salvar e acessar painel</span>
                </button>
                <p id="formError" class="hidden text-sm text-rose-600 text-center bg-rose-50 rounded-lg py-2 px-3"></p>
            </form>
        </div>

        <div class="text-center mt-6 space-y-1">
            <p class="text-slate-500 text-xs">Sistema desenvolvido por</p>
            <a href="https://sulcore.com" target="_blank" rel="noopener" class="inline-flex items-center gap-2 text-white/90 hover:text-white transition">
                <span class="brand-mark w-6 h-6 rounded-md flex items-center justify-center" style="box-shadow: none;">
                    <i class="ph-bold ph-cube text-white text-xs"></i>
                </span>
                <span class="sulcore-tag">SULCORE</span>
            </a>
            <p class="text-slate-600 text-xs pt-1">© 2026 SulCore · Todos os direitos reservados</p>
        </div>
    </div>

    <script src="/js/supabase-config.js"></script>
    <script type="module">
        import { adminAuth, supabase } from "/js/admin-auth.js";

        const loadingState = document.getElementById("loadingState");
        const errorState = document.getElementById("errorState");
        const errorMessage = document.getElementById("errorMessage");
        const passwordForm = document.getElementById("passwordForm");
        const emailField = document.getElementById("emailField");
        const passwordField = document.getElementById("passwordField");
        const confirmField = document.getElementById("confirmField");
        const submitBtn = document.getElementById("submitBtn");
        const formError = document.getElementById("formError");
        const subtitle = document.getElementById("subtitle");
        const togglePass = document.getElementById("togglePass");
        const strengthBar = document.getElementById("strengthBar");
        const strengthLabel = document.getElementById("strengthLabel");

        function showError(msg) {
            loadingState.classList.add("hidden");
            passwordForm.classList.add("hidden");
            errorState.classList.remove("hidden");
            errorMessage.textContent = msg;
        }
        function showForm(user, isRecovery) {
            loadingState.classList.add("hidden");
            errorState.classList.add("hidden");
            passwordForm.classList.remove("hidden");
            emailField.value = user.email || "";
            if (isRecovery) subtitle.textContent = "Defina uma nova senha para acessar o painel.";
        }

        // Toggle visibility
        togglePass.addEventListener("click", () => {
            const isPwd = passwordField.type === "password";
            passwordField.type = isPwd ? "text" : "password";
            togglePass.querySelector("i").className = isPwd ? "ph ph-eye-slash" : "ph ph-eye";
        });

        // Strength meter
        function scorePassword(pwd) {
            let score = 0;
            if (pwd.length >= 8) score++;
            if (pwd.length >= 12) score++;
            if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            return score;
        }
        passwordField.addEventListener("input", () => {
            const s = scorePassword(passwordField.value);
            const widths = ["0%", "20%", "40%", "60%", "80%", "100%"];
            const colors = ["bg-rose-400", "bg-rose-400", "bg-amber-400", "bg-amber-400", "bg-emerald-500", "bg-emerald-500"];
            const labels = ["Use 8+ caracteres com letras e números.", "Muito fraca", "Fraca", "Razoável", "Forte", "Excelente"];
            strengthBar.style.width = widths[s];
            strengthBar.className = `strength-bar h-full ${colors[s]}`;
            strengthLabel.textContent = passwordField.value ? labels[s] : labels[0];
        });

        // Erro vindo no hash da URL
        const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
        const hashParams = new URLSearchParams(hash);
        if (hashParams.get("error")) {
            const code = hashParams.get("error_code");
            const desc = hashParams.get("error_description") || "Link inválido.";
            const friendly = code === "otp_expired"
                ? "Este link expirou ou já foi usado. Solicite um novo na tela de login (\"Esqueci minha senha\")."
                : decodeURIComponent(desc.replace(/\+/g, " "));
            showError(friendly);
        } else {
            let handled = false;
            supabase.auth.onAuthStateChange(async (event, session) => {
                if (handled) return;
                if ((event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") && session?.user) {
                    handled = true;
                    showForm(session.user, event === "PASSWORD_RECOVERY");
                }
            });
            setTimeout(async () => {
                if (handled) return;
                const user = await adminAuth.getUser();
                if (user) { handled = true; showForm(user, false); }
                else showError("Link inválido ou expirado. Solicite um novo na tela de login (\"Esqueci minha senha\").");
            }, 1500);
        }

        passwordForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            formError.classList.add("hidden");

            if (passwordField.value !== confirmField.value) {
                formError.textContent = "As senhas não coincidem.";
                formError.classList.remove("hidden");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> <span>Salvando…</span>';
            try {
                const { error } = await supabase.auth.updateUser({ password: passwordField.value });
                if (error) throw error;
                window.location.href = "/admin.html";
            } catch (err) {
                formError.textContent = err.message || "Erro ao salvar senha.";
                formError.classList.remove("hidden");
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="ph-bold ph-check"></i> <span>Salvar e acessar painel</span>';
            }
        });
    </script>
</body>
</html>
